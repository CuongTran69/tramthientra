name: TramThienTra
options:
  bundleIdPrefix: com.tramthientra
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "7.10.0"

targets:
  TramThienTra:
    type: application
    platform: iOS
    sources:
      - path: TramThienTra
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tramthientra.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: SnapKit
      - package: Kingfisher
    info:
      path: TramThienTra/Info.plist
      properties:
        CFBundleDisplayName: Trạm Thiền Trà
        CFBundleName: TramThienTra
        UILaunchScreen: {}
        NSUserActivityTypes: []
    entitlements:
      path: TramThienTra/TramThienTra.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development

  TramThienTraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TramThienTraTests
    dependencies:
      - target: TramThienTra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tramthientra.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TramThienTra:
    build:
      targets:
        TramThienTra: all
        TramThienTraTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TramThienTraTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release